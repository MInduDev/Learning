<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Mini Project</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- HEADER SECTION START -->

    <header>
        <div class="logo">
            THALA <span>7.</span>
        </div>

        <nav> 
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="payment.html">Payment</a></li>
            </ul>
        </nav>

        <div class="nav-right">

    <!-- Search Box -->
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
    </div>

    <!-- Cart Box -->
    <div class="cart-box">
        <i class="fa-solid fa-bag-shopping"></i><span>0</span>
    </div>

    <!-- Profile -->
    <img src="/images/Profile.jpeg" alt="User">

</div>
    </header>
    
    <!-- HEADER SECTION END -->


    <!-- HERO SECTION -->

    <section class="hero">
        <div class="hero-left">
            <h1> 7!! THALA FOR A <span>REASON!</span></h1>
            <p>Step into greatness with the latest premium sneaker collection. 
            Comfortable, stylish and built for champions.</p>

            <a href="product.html" class="shop-btn">Shop Now</a>
        </div>

        <div class="hero-right">
            <img src="/Images/Shoe_img.png" alt="Shoe Image">
        </div>
    </section>

    <!-- HERO SECTION END -->

    <!-- SERVICE SECTION -->

    <section class="services">

    <div class="service-card">
        <i class="fa-solid fa-comments"></i>
        <h2>2K+</h2><p>Reviews</p>
    </div>

    <div class="service-card">
        <i class="fa-solid fa-users"></i>
        <h2>30K+</h2><p>Customers</p>
    </div>

    <div class="service-card">
        <i class="fa-solid fa-star"></i>
        <h2>4.5/5</h2><p>Rating</p>
    </div>

    <div class="service-card">
        <i class="fa-solid fa-medal"></i>
        <h2>100%</h2><p>Quality</p>
    </div>

</section>
    <!-- SERVICE SECTION END -->
</body>
</html>

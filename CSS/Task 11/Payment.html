<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Mini Project</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
     <!-- HEADER SECTION START -->

    <header>
        <div class="logo">
            THALA <span>7.</span>
        </div>

        <nav> 
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="payment.html">Payment</a></li>
            </ul>
        </nav>

        <div class="nav-right">

    <!-- Search Box -->
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
    </div>

    <!-- Cart Box -->
    <div class="cart-box">
        <i class="fa-solid fa-bag-shopping"></i><span>0</span>
    </div>

    <!-- Profile -->
    <img src="/images/Profile.jpeg" alt="User">

</div>
    </header>
    
    <!-- HEADER SECTION END -->


    <!-- PAYMENT SECTION -->

    <section class="payment-container">

        <!-- LEFT SIDE START -->

        <div class="payment-left">
            <h1>Checkout</h1>
            <form class="checkout-form">
                <label>Email ID</label>
                <input type="email" placeholder="Enter your email">

                <!-- PAYMENT OPTIONS -->

                <div class="payment-options">
                    <button type="button">Card</button>
                    <button type="button">Crypto</button>
                    <button type="button">Bank</button>
                </div>

                <label>Card Number</label>

                <input type="text" placeholder="1234 5678 9012 3456">
                <div class="row">
                    <div>

                        <label>Expiry</label>
                        <input type="text" placeholder="MM/YY">
                    </div>

                    <div>
                        <label>CVV</label>
                        <input type="text" placeholder="123">
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Country</label>
                        <input type="text" placeholder="India">
                    </div>

                    <div>
                        <label>Zip Code</label>
                        <input type="text" placeholder="462001">
                    </div>
                </div>
            </form>
        </div>

        <!-- RIGHT SIDE START-->

        <div class="payment-right">
        <div class="summary-card">
        <h2>Order Summary</h2>
           <div class="coupon-row">
                <input type="text" placeholder="Coupon Code">
                <button class="apply-btn">Apply Coupon</button>
           </div>

           <div class="price-details">
                <p>Sub Total <span>₹1,334</span></p>
                <p>Taxes <span>₹100</span></p>
                <p>Discount <span>₹0</span></p>

                <hr>

                <h3>Total <span>₹1,434</span></h3>
            </div>

            <button class="pay-btn">Pay Now ₹1,434</button>

        <div class="razorpay">
            <img src="images/razorpay.png" alt="Razorpay">
        </div>

    </div>
</div>
    </section>
</body>
</html>

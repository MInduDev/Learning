<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units, Box Model & Fonts</title>
     <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            width:100vw;
            height:100vh;
            font-family: Arial, sans-serif;
        }

        .container{
            width:50vw;              /* 25% left + 25% right spacing */
            margin-left:25vw;
            margin-right:25vw;
            margin-top:10vh;         /* 10% top spacing */
            margin-bottom:10vh;      /* 10% bottom spacing */
            border:3px solid black;
        }

        .container img{
            width:100%;
            height:50vh;
            display:block;
        }

        .btn{
            width:100%;
            height:10vh;
            border:none;
            cursor:pointer;
            color:white;
            font-size:2vw;
            font-weight:bold;
            font-family:Verdana, sans-serif;
            background:linear-gradient(to right,
                        #0f766e, #22c55e);
        }

        .btn:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/IMG/W2.jpeg " alt="Nature Image">

        <button class="btn">
            Click Me
        </button>
    </div>
</body>
</html>

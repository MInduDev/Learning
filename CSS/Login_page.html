<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#ffffff;
    }

    .container{
        width:80%;
        max-width:1100px;
        height:650px;
        display:flex;
        background:white;
    }

    .left{
        flex:1;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(to right,#4da6ff,#3f8efc);
    }

    .left img{
        width:70%;
        height:60%;
        object-fit:contain;
    }

    .right{
        flex:1;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .form-box{
        width:80%;
    }

    h1{
        font-size:55px;
        font-weight:bold;
        margin-bottom:10px;
        color:#111;
    }

    .subtitle{
        color:#666;
        font-size:20px;
        margin-bottom:60px;
    }

    label{
        display:block;
        font-size:20px;
        margin-bottom:10px;
        color:#333;
    }

    input{
        width:100%;
        border:none;
        border-bottom:2px solid #e0e0e0;
        padding:15px 5px;
        margin-bottom:40px;
        font-size:18px;
        outline:none;
    }

    .forgot{
        text-align:right;
        margin-bottom:35px;
    }

    .forgot a{
        text-decoration:none;
        color:#444;
        font-size:18px;
    }

    button{
        width:100%;
        padding:20px;
        border:none;
        border-radius:15px;
        background:linear-gradient(to right,#4da6ff,#3f8efc);
        color:white;
        font-size:28px;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }
</style>
</head>
<body>
    <div class="container">

    <div class="left">
        <img src="img.png" alt="Login Illustration">
    </div>

    <div class="right">

        <div class="form-box">

            <h1>Hello Again!</h1>

            <p class="subtitle">
                Welcome back! we missed you!
            </p>

            <label>Email</label>
            <input type="email" placeholder="Enter Email">

            <label>Password</label>
            <input type="password" placeholder="Enter Password">

            <div class="forgot">
                <a href="#">Forgot Password</a>
            </div>

            <button>Login</button>

        </div>

    </div>

</div>
</body>
</html>
